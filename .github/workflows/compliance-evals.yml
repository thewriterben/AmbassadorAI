name: Compliance rails check
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  compliance-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run DGD compliance eval suite (red-team rails guard)
        run: |
          python3 tools/run_compliance_evals.py --verbose
